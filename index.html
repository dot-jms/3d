<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Core Voxel Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; image-rendering: pixelated; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; color: white; font-family: monospace; font-size: 16px; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; mix-blend-mode: difference; }
        #fps { position: absolute; top: 20px; right: 20px; color: #0f0; font-family: monospace; font-size: 14px; pointer-events: none; text-shadow: 1px 1px 0 #000; }
    </style>
</head>
<body>
<div class="ui">
    <b>CLICK to Lock Mouse</b><br><br>
    WASD: Move<br>
    Mouse: Look Around<br>
    SPACE: Jump<br>
    <b>LEFT CLICK:</b> Break Block<br>
    <b>RIGHT CLICK:</b> Place Box<br><br>
    <span style="color:#0ff">Multithreading Active</span>
</div>
<div id="fps">-- FPS</div>
<div class="crosshair"></div>
<canvas id="gameCanvas"></canvas>

<script id="workerCode" type="javascript/worker">
let R_WIDTH, R_HEIGHT, TEX_SIZE, MW, MH, MD, MATCAP_SIZE;
let sharedPixels, stateF64, stateI32, sharedWorld, sharedTextures, sharedMatcap;
let myId, myStartY, myEndY;

function ARGB(r, g, b) { return (255 << 24) | (b << 16) | (g << 8) | r; }

self.onmessage = function(e) {
    const d = e.data;
    if (d.type === 'init') {
        ({ R_WIDTH, R_HEIGHT, TEX_SIZE, MW, MH, MD, MATCAP_SIZE, myId, myStartY, myEndY } = d);
        sharedPixels   = new Uint32Array(d.sharedPixels);
        stateF64       = new Float64Array(d.sharedState);
        stateI32       = new Int32Array(d.sharedState);
        sharedWorld    = new Uint8Array(d.sharedWorld);
        sharedTextures = new Uint32Array(d.sharedTextures);
        sharedMatcap   = new Uint32Array(d.sharedMatcap);
        // Switch to render-on-demand mode
        self.onmessage = onRender;
    }
};

function onRender(e) {
    if (e.data.type !== 'render') return;
    const { px, py, pz, yaw, pitch, time, sphX, sphY, sphZ, sphR } = e.data;

    // Only worker 0 animates magma texture
    if (myId === 0) {
        for (let i = 0; i < 4096; i++) {
            const wave = Math.sin((i % 64) * 0.2 + time) + Math.cos((i >> 6) * 0.2 + time);
            sharedTextures[i + 4 * 4096] = ARGB((200 + wave * 55) | 0, Math.max(0, (50 + wave * 25) | 0), 0);
        }
    }

    const cosYaw = Math.cos(yaw), sinYaw = Math.sin(yaw);
    const cosPitch = Math.cos(pitch), sinPitch = Math.sin(pitch);
    const dirX = cosYaw * cosPitch, dirY = sinYaw * cosPitch, dirZ = sinPitch;
    const rightX = sinYaw, rightY = -cosYaw, rightZ = 0;
    const upX = rightY*dirZ, upY = rightZ*dirX - rightX*dirZ, upZ = rightX*dirY - rightY*dirX;
    const aspect = R_WIDTH / R_HEIGHT;
    const invRW = 2.0 / R_WIDTH, invRH = 2.0 / R_HEIGHT;

    const invRad = 1.0 / sphR;
    const ocX = px - sphX, ocY = py - sphY, ocZ = pz - sphZ;
    const sphereC = ocX*ocX + ocY*ocY + ocZ*ocZ - sphR*sphR;

    for (let scanY = myStartY; scanY < myEndY; scanY++) {
        const v = (1.0 - scanY * invRH) * 0.8;
        const rowBase = scanY * R_WIDTH;
        for (let scanX = 0; scanX < R_WIDTH; scanX++) {
            const u = (scanX * invRW - 1.0) * 0.8 * aspect;
            let rdX = dirX + rightX*u + upX*v;
            let rdY = dirY + rightY*u + upY*v;
            let rdZ = dirZ + rightZ*u + upZ*v;
            const invLen = 1.0 / Math.sqrt(rdX*rdX + rdY*rdY + rdZ*rdZ);
            rdX *= invLen; rdY *= invLen; rdZ *= invLen;

            let mapX = px|0, mapY = py|0, mapZ = pz|0;
            const deltaX = Math.abs(1/rdX), deltaY = Math.abs(1/rdY), deltaZ = Math.abs(1/rdZ);
            const stepX = rdX<0?-1:1, stepY = rdY<0?-1:1, stepZ = rdZ<0?-1:1;
            let sideDistX = (rdX<0 ? px-mapX : mapX+1-px) * deltaX;
            let sideDistY = (rdY<0 ? py-mapY : mapY+1-py) * deltaY;
            let sideDistZ = (rdZ<0 ? pz-mapZ : mapZ+1-pz) * deltaZ;

            let hitBlock = 0, side = 0, dist = 0;
            for (let i = 0; i < 48; i++) {
                if (sideDistX < sideDistY) {
                    if (sideDistX < sideDistZ) { sideDistX += deltaX; mapX += stepX; side = 0; }
                    else                        { sideDistZ += deltaZ; mapZ += stepZ; side = 2; }
                } else {
                    if (sideDistY < sideDistZ) { sideDistY += deltaY; mapY += stepY; side = 1; }
                    else                        { sideDistZ += deltaZ; mapZ += stepZ; side = 2; }
                }
                if (mapX<0||mapX>=MW||mapY<0||mapY>=MH||mapZ<0||mapZ>=MD) break;
                hitBlock = sharedWorld[mapX + mapY*MW + mapZ*MW*MH];
                if (hitBlock > 0) {
                    dist = side===0 ? sideDistX-deltaX : (side===1 ? sideDistY-deltaY : sideDistZ-deltaZ);
                    break;
                }
            }

            const bDot = ocX*rdX + ocY*rdY + ocZ*rdZ;
            const h = bDot*bDot - sphereC;
            let finalColor = 0xFF000000;

            if (h > 0) {
                const t = -bDot - Math.sqrt(h);
                if (t > 0 && (hitBlock===0 || t < dist)) {
                    const nx=(ocX+rdX*t)*invRad, ny=(ocY+rdY*t)*invRad, nz=(ocZ+rdZ*t)*invRad;
                    const matU = nx*rightX + ny*rightY + nz*rightZ;
                    const matV = nx*upX    + ny*upY    + nz*upZ;
                    let mu=((matU*0.5+0.5)*MATCAP_SIZE)|0, mv=((-matV*0.5+0.5)*MATCAP_SIZE)|0;
                    if(mu<0)mu=0; if(mu>=MATCAP_SIZE)mu=MATCAP_SIZE-1;
                    if(mv<0)mv=0; if(mv>=MATCAP_SIZE)mv=MATCAP_SIZE-1;
                    finalColor = sharedMatcap[mu + mv*MATCAP_SIZE];
                    hitBlock = -1;
                }
            }

            if (hitBlock > 0) {
                const hitX=px+rdX*dist, hitY=py+rdY*dist, hitZ=pz+rdZ*dist;
                let tu=0, tv=0;
                if      (side===0) { tu=hitY%1; tv=hitZ%1; if(stepX>0) tu=1-tu; }
                else if (side===1) { tu=hitX%1; tv=hitZ%1; if(stepY<0) tu=1-tu; }
                else               { tu=hitX%1; tv=hitY%1; }
                let texX=(tu*TEX_SIZE)|0, texY=(tv*TEX_SIZE)|0;
                if (side!==2) texY=(TEX_SIZE-1)-texY;
                const texColor = sharedTextures[texX + texY*TEX_SIZE + hitBlock*4096];
                let r=texColor&0xFF, g=(texColor>>8)&0xFF, b=(texColor>>16)&0xFF;
                let shade = side===0?0.75:(side===1?0.6:(stepZ>0?0.4:1.0));
                let shadeFog = shade*(1.0-dist*0.04);
                if(shadeFog<0) shadeFog=0;
                if(hitBlock===4){r=(r*1.3)|0;g=(g*1.3)|0;}else{r=(r*shadeFog)|0;g=(g*shadeFog)|0;b=(b*shadeFog)|0;}
                finalColor = ARGB(r,g,b);
            } else if (hitBlock===0) {
                const sky=(rdZ>0?rdZ:0)*200|0;
                finalColor = ARGB(sky>>1, sky, 255);
            }

            sharedPixels[rowBase + scanX] = finalColor;
        }
    }

    // Signal completion via postMessage — no Atomics.wait needed on main thread
    self.postMessage({ type: 'done' });
}
</script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const R_WIDTH = 640, R_HEIGHT = 360;
canvas.width = R_WIDTH; canvas.height = R_HEIGHT;

function ARGB(r, g, b) { return (255 << 24) | (b << 16) | (g << 8) | r; }

const TEX_SIZE = 64;
const sharedTexBuf = new SharedArrayBuffer(5 * TEX_SIZE * TEX_SIZE * 4);
const textures = new Uint32Array(sharedTexBuf);
for (let y = 0; y < TEX_SIZE; y++) {
    for (let x = 0; x < TEX_SIZE; x++) {
        let i = x + y*TEX_SIZE;
        let stone = ((x^y)%8===0)?80:100+(Math.random()*20|0);
        textures[i + 1*4096] = ARGB(stone,stone,stone);
        let isDark = ((x>>4)^(y>>4))&1;
        textures[i + 2*4096] = isDark ? ARGB(100,60,20) : ARGB(139,90,35);
        textures[i + 3*4096] = ARGB(0, 100+(Math.random()*50|0), 0);
    }
}

const MATCAP_SIZE = 128;
const sharedMatBuf = new SharedArrayBuffer(MATCAP_SIZE * MATCAP_SIZE * 4);
const matcap = new Uint32Array(sharedMatBuf);
const lx=0.5,ly=-0.6,lz=0.8,hx=0.5,hy=-0.6,hz=(0.8+1)/2;
for (let y = 0; y < MATCAP_SIZE; y++) {
    for (let x = 0; x < MATCAP_SIZE; x++) {
        let nx=(x/MATCAP_SIZE)*2-1, ny=(y/MATCAP_SIZE)*2-1, d2=nx*nx+ny*ny;
        if(d2>1) continue;
        let nz=Math.sqrt(1-d2);
        let dot=Math.max(0.1,nx*lx+ny*ly+nz*lz);
        let spec=Math.max(0,nx*hx+ny*hy+nz*hz);
        spec=spec*spec;spec=spec*spec;spec=spec*spec;spec=spec*spec;spec=spec*spec;
        let intensity=Math.min(1,dot+spec);
        matcap[x+y*MATCAP_SIZE]=ARGB((spec*255)|0,(intensity*255)|0,(intensity*255)|0);
    }
}

const MW=32, MH=32, MD=16;
const sharedWorldBuf = new SharedArrayBuffer(MW*MH*MD);
const world = new Uint8Array(sharedWorldBuf);

function getBlock(x,y,z) { return (x<0||x>=MW||y<0||y>=MH||z<0||z>=MD)?0:world[x+y*MW+z*MW*MH]; }
function setBlock(x,y,z,id) { if(x>=0&&x<MW&&y>=0&&y<MH&&z>=0&&z<MD) world[x+y*MW+z*MW*MH]=id; }

for(let z=0;z<MD;z++) for(let y=0;y<MH;y++) for(let x=0;x<MW;x++){
    if(z===0) setBlock(x,y,z,1);
    if((x===0||x===MW-1||y===0||y===MH-1)&&z<6) setBlock(x,y,z,1);
}
for(let x=12;x<20;x++) for(let y=12;y<20;y++) setBlock(x,y,0,4);
setBlock(5,5,1,2);setBlock(5,6,1,2);setBlock(7,6,1,2);setBlock(7,6,2,2);
for(let x=9;x<=11;x++) for(let y=5;y<=7;y++){setBlock(x,y,1,1);setBlock(x,y,2,1);setBlock(x,y,3,3);}

const sphere={x:16.5,y:16.5,z:3.5,radius:1.5};

const sharedPixelBuf = new SharedArrayBuffer(R_WIDTH * R_HEIGHT * 4);
const player={x:2.5,y:2.5,z:1.5,yaw:Math.PI/4,pitch:0,vz:0,grounded:false,radius:0.2,eyeHeight:0.8,height:1.2};
const keys={w:false,a:false,s:false,d:false,space:false};

canvas.addEventListener('click', ()=>canvas.requestPointerLock());
window.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement!==canvas) return;
    player.yaw  -=e.movementX*0.003;
    player.pitch-=e.movementY*0.003;
    player.pitch=Math.max(-Math.PI/2+0.01,Math.min(Math.PI/2-0.01,player.pitch));
});
canvas.addEventListener('mousedown', e=>{
    if(document.pointerLockElement!==canvas) return;
    let dX=Math.cos(player.yaw)*Math.cos(player.pitch),dY=Math.sin(player.yaw)*Math.cos(player.pitch),dZ=Math.sin(player.pitch);
    let mX=player.x|0,mY=player.y|0,mZ=player.z|0;
    let delX=Math.abs(1/dX),delY=Math.abs(1/dY),delZ=Math.abs(1/dZ);
    let stX=dX<0?-1:1,stY=dY<0?-1:1,stZ=dZ<0?-1:1;
    let sdX=(dX<0?player.x-mX:mX+1-player.x)*delX,sdY=(dY<0?player.y-mY:mY+1-player.y)*delY,sdZ=(dZ<0?player.z-mZ:mZ+1-player.z)*delZ;
    let pX,pY,pZ;
    for(let i=0;i<20;i++){
        pX=mX;pY=mY;pZ=mZ;
        if(sdX<sdY){if(sdX<sdZ){sdX+=delX;mX+=stX;}else{sdZ+=delZ;mZ+=stZ;}}else{if(sdY<sdZ){sdY+=delY;mY+=stY;}else{sdZ+=delZ;mZ+=stZ;}}
        if(mX<0||mX>=MW||mY<0||mY>=MH||mZ<0||mZ>=MD) break;
        let hit=getBlock(mX,mY,mZ);
        if(hit>0){
            if(e.button===0){if(mZ>0||hit!==1)setBlock(mX,mY,mZ,0);}
            else if(e.button===2){
                let ints=(pX+1>player.x-player.radius&&pX<player.x+player.radius&&pY+1>player.y-player.radius&&pY<player.y+player.radius&&pZ+1>player.z-player.eyeHeight&&pZ<player.z-player.eyeHeight+player.height);
                if(!ints)setBlock(pX,pY,pZ,2);
            }
            break;
        }
    }
});
window.addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(k in keys)keys[k]=true;if(e.key===' ')keys.space=true;});
window.addEventListener('keyup',  e=>{let k=e.key.toLowerCase();if(k in keys)keys[k]=false;if(e.key===' ')keys.space=false;});

function checkCollision(px,py,pz){
    for(let z=Math.floor(pz-player.eyeHeight);z<=Math.floor(pz-player.eyeHeight+player.height);z++)
        for(let y=Math.floor(py-player.radius);y<=Math.floor(py+player.radius);y++)
            for(let x=Math.floor(px-player.radius);x<=Math.floor(px+player.radius);x++)
                if(getBlock(x,y,z)>0) return true;
    return false;
}
function updatePhysics(){
    let dx=(keys.w?1:0)-(keys.s?1:0),dy=(keys.a?1:0)-(keys.d?1:0);
    let mX=Math.cos(player.yaw)*dx-Math.sin(player.yaw)*dy,mY=Math.sin(player.yaw)*dx+Math.cos(player.yaw)*dy;
    let len=Math.sqrt(mX*mX+mY*mY);
    if(len>0){mX=(mX/len)*0.08;mY=(mY/len)*0.08;}
    if(!checkCollision(player.x+mX,player.y,player.z)) player.x+=mX;
    if(!checkCollision(player.x,player.y+mY,player.z)) player.y+=mY;
    player.vz-=0.005;
    if(keys.space&&player.grounded){player.vz=0.12;player.grounded=false;}
    let nZ=player.z+player.vz;
    if(checkCollision(player.x,player.y,nZ)){
        player.z=player.vz<0?Math.floor(nZ-player.eyeHeight)+1+player.eyeHeight+0.001:Math.floor(nZ-player.eyeHeight+player.height)-player.height+player.eyeHeight-0.001;
        player.grounded=player.vz<0;player.vz=0;
    }else{player.z=nZ;player.grounded=false;}
}

// Workers signal completion via postMessage — zero Atomics.wait on main thread
const NUM_WORKERS = Math.min(8, navigator.hardwareConcurrency || 4);
const workerSrc = document.getElementById('workerCode').textContent;
const workerURL = URL.createObjectURL(new Blob([workerSrc], { type: 'application/javascript' }));
const workers = [];

const sharedPixelsView = new Uint8ClampedArray(sharedPixelBuf);
const localPixelBuf = new Uint8ClampedArray(R_WIDTH * R_HEIGHT * 4);
const imgData = new ImageData(localPixelBuf, R_WIDTH, R_HEIGHT);
const fpsEl = document.getElementById('fps');
let frameCount = 0, lastFpsTime = performance.now();
let doneCount = 0;
let rendering = false;

function onWorkerDone() {
    doneCount++;
    if (doneCount === NUM_WORKERS) {
        localPixelBuf.set(sharedPixelsView);
        ctx.putImageData(imgData, 0, 0);
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 500) {
            fpsEl.textContent = (frameCount * 1000 / (now - lastFpsTime) | 0) + ' FPS';
            frameCount = 0; lastFpsTime = now;
        }
        rendering = false;
        requestAnimationFrame(dispatchFrame);
    }
}

for(let i=0;i<NUM_WORKERS;i++){
    const startY=Math.floor(i*R_HEIGHT/NUM_WORKERS);
    const endY  =i===NUM_WORKERS-1?R_HEIGHT:Math.floor((i+1)*R_HEIGHT/NUM_WORKERS);
    const w = new Worker(workerURL);
    w.onmessage = onWorkerDone;
    workers.push(w);
    w.postMessage({
        type:'init', myId:i, myStartY:startY, myEndY:endY,
        R_WIDTH, R_HEIGHT, TEX_SIZE, MW, MH, MD, MATCAP_SIZE,
        sharedPixels:   sharedPixelBuf,
        sharedState:    new SharedArrayBuffer(8), // unused but kept for compat
        sharedWorld:    sharedWorldBuf,
        sharedTextures: sharedTexBuf,
        sharedMatcap:   sharedMatBuf,
    });
}

function dispatchFrame() {
    if (rendering) return;
    rendering = true;
    doneCount = 0;
    updatePhysics();

    const payload = {
        type: 'render',
        px: player.x, py: player.y, pz: player.z,
        yaw: player.yaw, pitch: player.pitch,
        time: performance.now() * 0.005,
        sphX: sphere.x, sphY: sphere.y, sphZ: sphere.z, sphR: sphere.radius
    };

    for(let i=0;i<NUM_WORKERS;i++) workers[i].postMessage(payload);
}

dispatchFrame();
</script>
</body>
</html>
