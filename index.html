<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Core Voxel Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { 
            width: 100vw; height: 100vh; 
            object-fit: cover; 
            image-rendering: pixelated; 
            cursor: crosshair; 
        }
        .ui { position: absolute; top: 20px; left: 20px; color: white; font-family: monospace; font-size: 16px; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; mix-blend-mode: difference; }
    </style>
</head>
<body>
    <div class="ui">
        <b>CLICK to Lock Mouse</b><br><br>
        WASD: Move<br>
        Mouse: Look Around<br>
        SPACE: Jump<br>
        <b>LEFT CLICK:</b> Break Block<br>
        <b>RIGHT CLICK:</b> Place Box<br><br>
        <span style="color:#0ff">Multithreading Active</span>
    </div>
    <div class="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

    <script id="workerCode" type="javascript/worker">
        let R_WIDTH, R_HEIGHT, TEX_SIZE, MW, MH, MD, MATCAP_SIZE;
        let world, textures, matcap, sphere;

        function ARGB(r, g, b) { return (255 << 24) | (b << 16) | (g << 8) | r; }

        self.onmessage = function(e) {
            if (e.data.type === 'init') {
                R_WIDTH = e.data.R_WIDTH; R_HEIGHT = e.data.R_HEIGHT;
                TEX_SIZE = e.data.TEX_SIZE; MW = e.data.MW; MH = e.data.MH; MD = e.data.MD;
                MATCAP_SIZE = e.data.MATCAP_SIZE;
                world = e.data.world; textures = e.data.textures; matcap = e.data.matcap;
                sphere = e.data.sphere;
            } else if (e.data.type === 'updateBlock') {
                world[e.data.idx] = e.data.id; // Sync blocks when player breaks/places them
            } else if (e.data.type === 'render') {
                let { player, startY, endY, magmaTexture, buffer, id } = e.data;
                let u32 = new Uint32Array(buffer);

                // Sync the dynamic magma animation
                for(let i=0; i<4096; i++) textures[i + 4*4096] = magmaTexture[i];

                let dirX = Math.cos(player.yaw) * Math.cos(player.pitch);
                let dirY = Math.sin(player.yaw) * Math.cos(player.pitch);
                let dirZ = Math.sin(player.pitch);
                let rightX = Math.sin(player.yaw), rightY = -Math.cos(player.yaw), rightZ = 0;
                let upX = rightY * dirZ - rightZ * dirY, upY = rightZ * dirX - rightX * dirZ, upZ = rightX * dirY - rightY * dirX;

                const aspect = R_WIDTH / R_HEIGHT;
                let invRad = 1.0 / sphere.radius;
                let ocX = player.x - sphere.x, ocY = player.y - sphere.y, ocZ = player.z - sphere.z;
                let sphereC = (ocX * ocX) + (ocY * ocY) + (ocZ * ocZ) - (sphere.radius * sphere.radius);

                // Render ONLY the horizontal slice assigned to this specific CPU core
                for (let py = startY; py < endY; py++) {
                    let v = (1.0 - 2.0 * py / R_HEIGHT) * 0.8;
                    for (let px = 0; px < R_WIDTH; px++) {
                        let u = (2.0 * px / R_WIDTH - 1.0) * 0.8 * aspect;
                        let rdX = dirX + rightX * u + upX * v, rdY = dirY + rightY * u + upY * v, rdZ = dirZ + rightZ * u + upZ * v;
                        let rdLen = Math.sqrt(rdX*rdX + rdY*rdY + rdZ*rdZ);
                        rdX /= rdLen; rdY /= rdLen; rdZ /= rdLen;

                        let mapX = Math.floor(player.x), mapY = Math.floor(player.y), mapZ = Math.floor(player.z);
                        let deltaX = Math.abs(1 / rdX), deltaY = Math.abs(1 / rdY), deltaZ = Math.abs(1 / rdZ);
                        let stepX = rdX < 0 ? -1 : 1, stepY = rdY < 0 ? -1 : 1, stepZ = rdZ < 0 ? -1 : 1;
                        let sideDistX = (rdX < 0 ? player.x - mapX : mapX + 1.0 - player.x) * deltaX;
                        let sideDistY = (rdY < 0 ? player.y - mapY : mapY + 1.0 - player.y) * deltaY;
                        let sideDistZ = (rdZ < 0 ? player.z - mapZ : mapZ + 1.0 - player.z) * deltaZ;

                        let hitBlock = 0, side = 0, dist = 0;
                        
                        // 3D DDA Raymarcher
                        for (let i = 0; i < 40; i++) {
                            if (sideDistX < sideDistY) { if (sideDistX < sideDistZ) { sideDistX += deltaX; mapX += stepX; side = 0; } else { sideDistZ += deltaZ; mapZ += stepZ; side = 2; } } 
                            else { if (sideDistY < sideDistZ) { sideDistY += deltaY; mapY += stepY; side = 1; } else { sideDistZ += deltaZ; mapZ += stepZ; side = 2; } }
                            if (mapX < 0 || mapX >= MW || mapY < 0 || mapY >= MH || mapZ < 0 || mapZ >= MD) break;
                            hitBlock = world[mapX + mapY*MW + mapZ*MW*MH];
                            if (hitBlock > 0) {
                                dist = side === 0 ? sideDistX - deltaX : (side === 1 ? sideDistY - deltaY : sideDistZ - deltaZ);
                                break;
                            }
                        }

                        let b = ocX * rdX + ocY * rdY + ocZ * rdZ;
                        let h = b * b - sphereC;
                        let finalColor = 0xFF000000;

                        if (h > 0) {
                            let t = -b - Math.sqrt(h);
                            if (t > 0 && (hitBlock === 0 || t < dist)) {
                                let nx = (ocX + rdX*t) * invRad, ny = (ocY + rdY*t) * invRad, nz = (ocZ + rdZ*t) * invRad;
                                let matX = nx * rightX + ny * rightY + nz * rightZ, matY = nx * upX + ny * upY + nz * upZ;
                                let mu = ((matX * 0.5 + 0.5) * MATCAP_SIZE) | 0, mv = ((-matY * 0.5 + 0.5) * MATCAP_SIZE) | 0;
                                if(mu<0) mu=0; if(mu>=MATCAP_SIZE) mu=MATCAP_SIZE-1;
                                if(mv<0) mv=0; if(mv>=MATCAP_SIZE) mv=MATCAP_SIZE-1;
                                finalColor = matcap[mu + mv * MATCAP_SIZE];
                                hitBlock = -1; 
                            }
                        }

                        if (hitBlock > 0) {
                            let hitX = player.x + rdX * dist, hitY = player.y + rdY * dist, hitZ = player.z + rdZ * dist;
                            let u = 0, v = 0;
                            if (side === 0)      { u = hitY % 1; v = hitZ % 1; if (stepX > 0) u = 1 - u; } 
                            else if (side === 1) { u = hitX % 1; v = hitZ % 1; if (stepY < 0) u = 1 - u; } 
                            else                 { u = hitX % 1; v = hitY % 1; }

                            let texX = (u * TEX_SIZE) | 0, texY = (v * TEX_SIZE) | 0;
                            if (side !== 2) texY = (TEX_SIZE - 1) - texY; 
                            let texColor = textures[texX + texY * TEX_SIZE + hitBlock * 4096];
                            let r = texColor & 0xFF, g = (texColor >> 8) & 0xFF, b = (texColor >> 16) & 0xFF;
                            
                            let shade = side === 0 ? 0.75 : (side === 1 ? 0.6 : (stepZ > 0 ? 0.4 : 1.0)); 
                            let shadeFog = shade * (1.0 - dist * 0.04); 
                            if (shadeFog < 0) shadeFog = 0;

                            if (hitBlock === 4) { r *= 1.3; g *= 1.3; } else { r *= shadeFog; g *= shadeFog; b *= shadeFog; }
                            finalColor = ARGB(r|0, g|0, b|0);
                        } else if (hitBlock === 0) {
                            let sky = (rdZ > 0 ? rdZ : 0) * 200 | 0;
                            finalColor = ARGB(sky/2, sky, 255);
                        }

                        u32[px + (py - startY) * R_WIDTH] = finalColor;
                    }
                }

                // Send the completed memory block back to the main browser thread
                self.postMessage({ type: 'done', id: id, buffer: buffer }, [buffer]);
            }
        };
    </script>

<script>
/** * HIGH WIDESCREEN RESOLUTION (640 x 360) */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const R_WIDTH = 640, R_HEIGHT = 360; 
canvas.width = R_WIDTH; canvas.height = R_HEIGHT;

const imgData = ctx.createImageData(R_WIDTH, R_HEIGHT);
const buf32 = new Uint32Array(imgData.data.buffer);

function ARGB(r, g, b) { return (255 << 24) | (b << 16) | (g << 8) | r; }

/** * FAST PROCEDURAL TEXTURES */
const TEX_SIZE = 64;
const textures = new Uint32Array(5 * TEX_SIZE * TEX_SIZE);

for (let y = 0; y < TEX_SIZE; y++) {
    for (let x = 0; x < TEX_SIZE; x++) {
        let i = x + y * TEX_SIZE;
        let stone = ((x^y)%8 === 0) ? 80 : 100 + (Math.random() * 20 | 0);
        textures[i + 1 * 4096] = ARGB(stone, stone, stone);
        let isDark = ((x >> 4) ^ (y >> 4)) & 1;
        textures[i + 2 * 4096] = isDark ? ARGB(100, 60, 20) : ARGB(139, 90, 35);
        textures[i + 3 * 4096] = ARGB(0, 100 + (Math.random() * 50 | 0), 0);
    }
}

/** * PRE-CALCULATED LIGHTING MATCAP */
const MATCAP_SIZE = 128;
const matcap = new Uint32Array(MATCAP_SIZE * MATCAP_SIZE);
const lx = 0.5, ly = -0.6, lz = 0.8; 
const hx = lx, hy = ly, hz = (lz + 1) / 2;

for (let y = 0; y < MATCAP_SIZE; y++) {
    for (let x = 0; x < MATCAP_SIZE; x++) {
        let nx = (x / MATCAP_SIZE) * 2 - 1, ny = (y / MATCAP_SIZE) * 2 - 1;
        let d2 = nx*nx + ny*ny;
        if (d2 > 1.0) continue;
        let nz = Math.sqrt(1.0 - d2);
        
        let dot = Math.max(0.1, nx*lx + ny*ly + nz*lz);
        let spec = Math.max(0, nx*hx + ny*hy + nz*hz);
        spec = spec*spec; spec = spec*spec; spec = spec*spec; spec = spec*spec; spec = spec*spec;
        
        let intensity = Math.min(1, dot + spec);
        matcap[x + y*MATCAP_SIZE] = ARGB((spec * 255) | 0, (intensity * 255) | 0, (intensity * 255) | 0);
    }
}

/** * 3D VOXEL WORLD */
const MW = 32, MH = 32, MD = 16;
const world = new Uint8Array(MW * MH * MD);

// Declared here so setBlock can reference workers during world generation below
var workers = [];
var workerBuffers = [];
var workerEnds = [];

function getBlock(x, y, z) { return (x<0 || x>=MW || y<0 || y>=MH || z<0 || z>=MD) ? 0 : world[x + y*MW + z*MW*MH]; }
function setBlock(x, y, z, id) { 
    if(x>=0 && x<MW && y>=0 && y<MH && z>=0 && z<MD) {
        let idx = x + y*MW + z*MW*MH;
        world[idx] = id;
        // Alert all CPU cores that a block was changed!
        if(workers.length > 0) workers.forEach(w => w.postMessage({ type: 'updateBlock', idx: idx, id: id }));
    }
}

for (let z = 0; z < MD; z++) for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    if (z === 0) setBlock(x, y, z, 1); 
    if ((x === 0 || x === MW-1 || y === 0 || y === MH-1) && z < 6) setBlock(x, y, z, 1); 
}
for (let x = 12; x < 20; x++) for (let y = 12; y < 20; y++) setBlock(x, y, 0, 4); // Magma
setBlock(5, 5, 1, 2); setBlock(5, 6, 1, 2); setBlock(7, 6, 1, 2); setBlock(7, 6, 2, 2);
for(let x=9; x<=11; x++) for(let y=5; y<=7; y++) { setBlock(x, y, 1, 1); setBlock(x, y, 2, 1); setBlock(x, y, 3, 3); }

const sphere = { x: 16.5, y: 16.5, z: 3.5, radius: 1.5 };

/** * PLAYER & PHYSICS */
const player = { x: 2.5, y: 2.5, z: 1.5, yaw: Math.PI / 4, pitch: 0, vz: 0, grounded: false, radius: 0.2, eyeHeight: 0.8, height: 1.2 };
const keys = { w: false, a: false, s: false, d: false, space: false };

canvas.addEventListener('click', () => canvas.requestPointerLock());
window.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === canvas) {
        player.yaw -= e.movementX * 0.003; 
        player.pitch -= e.movementY * 0.003; 
        player.pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, player.pitch));
    }
});

canvas.addEventListener('mousedown', (e) => {
    if (document.pointerLockElement !== canvas) return;
    let dirX = Math.cos(player.yaw) * Math.cos(player.pitch), dirY = Math.sin(player.yaw) * Math.cos(player.pitch), dirZ = Math.sin(player.pitch);
    let mapX = Math.floor(player.x), mapY = Math.floor(player.y), mapZ = Math.floor(player.z);
    let deltaX = Math.abs(1 / dirX), deltaY = Math.abs(1 / dirY), deltaZ = Math.abs(1 / dirZ);
    let stepX = dirX < 0 ? -1 : 1, stepY = dirY < 0 ? -1 : 1, stepZ = dirZ < 0 ? -1 : 1;
    let sideDistX = (dirX < 0 ? player.x - mapX : mapX + 1.0 - player.x) * deltaX;
    let sideDistY = (dirY < 0 ? player.y - mapY : mapY + 1.0 - player.y) * deltaY;
    let sideDistZ = (dirZ < 0 ? player.z - mapZ : mapZ + 1.0 - player.z) * deltaZ;

    let prevX, prevY, prevZ;
    for (let i = 0; i < 20; i++) { 
        prevX = mapX; prevY = mapY; prevZ = mapZ;
        if (sideDistX < sideDistY) { if (sideDistX < sideDistZ) { sideDistX += deltaX; mapX += stepX; } else { sideDistZ += deltaZ; mapZ += stepZ; } } 
        else { if (sideDistY < sideDistZ) { sideDistY += deltaY; mapY += stepY; } else { sideDistZ += deltaZ; mapZ += stepZ; } }
        if (mapX < 0 || mapX >= MW || mapY < 0 || mapY >= MH || mapZ < 0 || mapZ >= MD) break;
        let hitBlock = getBlock(mapX, mapY, mapZ);
        if (hitBlock > 0) {
            if (e.button === 0) { if (mapZ > 0 || hitBlock !== 1) setBlock(mapX, mapY, mapZ, 0); } 
            else if (e.button === 2) {
                let intersects = (prevX + 1 > player.x - player.radius && prevX < player.x + player.radius && prevY + 1 > player.y - player.radius && prevY < player.y + player.radius && prevZ + 1 > player.z - player.eyeHeight && prevZ < player.z - player.eyeHeight + player.height);
                if (!intersects) setBlock(prevX, prevY, prevZ, 2);
            }
            break;
        }
    }
});

window.addEventListener('keydown', (e) => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = true; if(e.key === ' ') keys.space = true; });
window.addEventListener('keyup', (e) => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = false; if(e.key === ' ') keys.space = false; });

function checkCollision(px, py, pz) {
    for (let z = Math.floor(pz - player.eyeHeight); z <= Math.floor(pz - player.eyeHeight + player.height); z++)
        for (let y = Math.floor(py - player.radius); y <= Math.floor(py + player.radius); y++)
            for (let x = Math.floor(px - player.radius); x <= Math.floor(px + player.radius); x++)
                if (getBlock(x, y, z) > 0) return true;
    return false;
}

function updatePhysics() {
    let dx = (keys.w ? 1 : 0) - (keys.s ? 1 : 0), dy = (keys.a ? 1 : 0) - (keys.d ? 1 : 0); 
    let moveX = Math.cos(player.yaw) * dx - Math.sin(player.yaw) * dy, moveY = Math.sin(player.yaw) * dx + Math.cos(player.yaw) * dy;
    let len = Math.sqrt(moveX*moveX + moveY*moveY);
    if(len > 0) { moveX = (moveX/len)*0.08; moveY = (moveY/len)*0.08; }

    if (!checkCollision(player.x + moveX, player.y, player.z)) player.x += moveX;
    if (!checkCollision(player.x, player.y + moveY, player.z)) player.y += moveY;

    player.vz -= 0.005; 
    if (keys.space && player.grounded) { player.vz = 0.12; player.grounded = false; }
    
    let nextZ = player.z + player.vz;
    if (checkCollision(player.x, player.y, nextZ)) {
        player.z = player.vz < 0 ? Math.floor(nextZ - player.eyeHeight) + 1 + player.eyeHeight + 0.001 : Math.floor(nextZ - player.eyeHeight + player.height) - player.height + player.eyeHeight - 0.001;
        player.grounded = player.vz < 0; player.vz = 0;
    } else { player.z = nextZ; player.grounded = false; }
}

/** * MULTI-THREADING INITIALIZATION */
let workersDone = 0;

// Cap it at 8 cores to avoid thread thrashing
const NUM_WORKERS = Math.min(8, navigator.hardwareConcurrency || 4);

// Use data URI instead of Blob URL to work on GitHub Pages (Blob URLs are blocked by CSP)
let workerURL = 'data:application/javascript;base64,' + btoa(unescape(encodeURIComponent(document.getElementById('workerCode').textContent)));

for (let i = 0; i < NUM_WORKERS; i++) {
    let worker = new Worker(workerURL);
    workers.push(worker);

    let startY = Math.floor(i * (R_HEIGHT / NUM_WORKERS));
    let endY = i === NUM_WORKERS - 1 ? R_HEIGHT : Math.floor((i + 1) * (R_HEIGHT / NUM_WORKERS));
    let sliceHeight = endY - startY;
    workerEnds.push({ startY, endY, sliceHeight });
    
    workerBuffers.push(new ArrayBuffer(R_WIDTH * sliceHeight * 4));

    worker.postMessage({
        type: 'init', R_WIDTH, R_HEIGHT, TEX_SIZE, MW, MH, MD, MATCAP_SIZE,
        world, textures, matcap, sphere
    });

    // When a CPU core finishes its slice, it sends the pixels back to stitch together
    worker.onmessage = function(e) {
        let id = e.data.id;
        workerBuffers[id] = e.data.buffer; 
        let u32 = new Uint32Array(e.data.buffer);
        let sy = workerEnds[id].startY;
        buf32.set(u32, sy * R_WIDTH);

        workersDone++;
        // If all cores are done, draw the stitched image to the screen and loop!
        if (workersDone === NUM_WORKERS) {
            workersDone = 0;
            ctx.putImageData(imgData, 0, 0);
            requestAnimationFrame(draw);
        }
    };
}

/** * VOXEL RAYTRACER RENDERING */
// Recreates worker buffers each frame if ownership was transferred (merged fix)
function updateBuffers() {
    if (workerEnds.length === 0) return;
    for (let i = 0; i < NUM_WORKERS; i++) {
        if (!workerBuffers[i] || workerBuffers[i].byteLength === 0) {
            workerBuffers[i] = new ArrayBuffer(R_WIDTH * workerEnds[i].sliceHeight * 4);
        }
    }
}

function draw() {
    updatePhysics();
    updateBuffers();

    let magmaTexture = new Uint32Array(4096);
    let time = performance.now() * 0.005;
    for (let i = 0; i < 4096; i++) {
        let wave = Math.sin((i % 64) * 0.2 + time) + Math.cos(Math.floor(i / 64) * 0.2 + time);
        magmaTexture[i] = ARGB((200 + wave * 55) | 0, Math.max(0, (50 + wave * 25) | 0), 0);
    }

    // Ship the command off to the separate CPU cores!
    for (let i = 0; i < NUM_WORKERS; i++) {
        workers[i].postMessage({
            type: 'render', id: i,
            player: { x: player.x, y: player.y, z: player.z, yaw: player.yaw, pitch: player.pitch },
            startY: workerEnds[i].startY, endY: workerEnds[i].endY,
            magmaTexture: magmaTexture,
            buffer: workerBuffers[i]
        }, [workerBuffers[i]]); // Transfer ownership of the memory instantly
    }
}

draw(); // Start the engine
</script>
</body>
</html>
